<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Outer circle -->
  <circle cx="50" cy="50" r="30"
          fill="none"
          stroke="#1F2937"
          stroke-width="1.2"/>

  <!-- Vertical meridian -->
  <ellipse cx="50" cy="50" rx="15" ry="30"
           fill="none"
           stroke="#1F2937"
           stroke-width="1.2"/>

  <!-- Horizontal latitude -->
  <line x1="20" y1="50" x2="80" y2="50"
        stroke="#1F2937"
        stroke-width="1.2"
        stroke-linecap="round"/>

</svg>